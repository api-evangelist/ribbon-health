aid: ribbon-health
name: Ribbon Health
description: >
  Ribbon Health (now part of H1) is a healthcare provider data platform offering
  a REST API for searching provider directories, verifying insurance networks,
  checking provider availability, and enriching clinical data. The H1 API provides
  comprehensive data on doctors, insurance plans, procedures, costs, and quality
  scores across the United States, enabling health plans, providers, and digital
  health solutions to build accurate provider directories and care navigation tools.
