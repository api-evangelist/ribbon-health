apis:
  - aid: ribbon-health:h1-api
    name: H1 API (Ribbon Health)
    description: >
      The H1 REST API provides healthcare enterprises with accurate data on
      providers, insurance plans, costs, and quality of care. Key capabilities
      include provider search and lookup by NPI, location search, insurance
      network verification, eligibility checking, procedure cost estimation,
      and custom provider directory management.
